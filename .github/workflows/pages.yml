name: Deploy docs + demo to GitHub Pages

# Builds the mdBook (docs-site/book) to the site root and the WebAssembly TUI demo
# (docs-site/sirbone-web) to /demo, then publishes the combined artifact.
# Repo Settings → Pages → Source must be "GitHub Actions".

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  TRUNK_VERSION: v0.21.14
  MDBOOK_VERSION: v0.4.40

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust (wasm target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: docs-site/sirbone-web

      # Pre-built binaries are much faster than `cargo install`.
      - name: Install Trunk
        run: |
          wget -qO- "https://github.com/trunk-rs/trunk/releases/download/${TRUNK_VERSION}/trunk-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xzf- -C /usr/local/bin

      - name: Install mdBook
        run: |
          wget -qO- "https://github.com/rust-lang/mdBook/releases/download/${MDBOOK_VERSION}/mdbook-${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xzf- -C /usr/local/bin

      - name: Build mdBook (site root)
        run: mdbook build docs-site/book

      - name: Build WASM demo (/demo)
        working-directory: docs-site/sirbone-web
        run: |
          trunk build --config Trunk.ghpages.toml \
            --public-url "/${{ github.event.repository.name }}/demo/"

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r docs-site/book/book/* _site/
          mkdir -p _site/demo
          cp -r docs-site/sirbone-web/dist/* _site/demo/
          # Disable Jekyll so files/dirs starting with _ are served verbatim.
          touch _site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
