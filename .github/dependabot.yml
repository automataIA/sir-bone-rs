version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      # bincode 3.0.0 is a tombstone release (single compile_error!, xkcd/2347);
      # the crate is unmaintained. Never bump past the 2.x line.
      - dependency-name: "bincode"
        versions: [">=3.0.0"]
      # ratatui + ratatui-markdown must move in lockstep; a solo ratatui-markdown
      # bump pulls ratatui-core, splitting Line/Span into two distinct types.
      - dependency-name: "ratatui-markdown"
    groups:
      rust-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
