# cargo-deny configuration — supply-chain gates (licenses, advisories, bans, sources).
# Run locally with: cargo deny check

[graph]
all-features = true

[advisories]
# Fail on yanked crates and any unfixed security advisory.
yanked = "deny"
# Unmaintained-only advisories with no safe upgrade. Neither is a vulnerability
# and neither is reachable by untrusted input here:
#   RUSTSEC-2025-0141  bincode 1.3.3 — maintainer declares 1.x complete/stable;
#                      used only to (de)serialize our own local structure cache.
#   RUSTSEC-2024-0436  paste 1.0.15  — transitive via ratatui; no upstream fix yet.
#   RUSTSEC-2024-0384  instant 0.1.13 — unmaintained transitive via
#                      tantivy -> measure_time; no safe upgrade available.
ignore = [
    "RUSTSEC-2025-0141",
    "RUSTSEC-2024-0436",
    "RUSTSEC-2024-0384",
]

[licenses]
# SPDX license expressions permitted in the dependency tree.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "Unlicense",            # rustyline-async (public-domain equivalent)
    "CDLA-Permissive-2.0",  # webpki-root-certs (Mozilla CA bundle data)
]
confidence-threshold = 0.8

[bans]
# Surface accidental duplicate-version bloat without failing the build.
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
# The vendored ratatui-markdown fork is wired in via [patch.crates-io] (path dep),
# so no unknown git sources are expected.
unknown-git = "deny"
